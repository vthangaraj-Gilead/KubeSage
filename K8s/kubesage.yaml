apiVersion: v1
kind: Namespace
metadata:
  name: kubesage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesage-sa
  namespace: kubesage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesage-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - namespaces
      - persistentvolumeclaims
      - nodes
      - services
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesage-readonly-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesage-readonly
subjects:
  - kind: ServiceAccount
    name: kubesage-sa
    namespace: kubesage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesage
  namespace: kubesage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesage
  template:
    metadata:
      labels:
        app: kubesage
    spec:
      serviceAccountName: kubesage-sa
      containers:
        - name: kubesage
          image: your-registry/kubesage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: OLLAMA_URL
              value: "http://ollama.default.svc.cluster.local:11434/api/chat"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: kubesage
  namespace: kubesage
spec:
  selector:
    app: kubesage
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  type: ClusterIP